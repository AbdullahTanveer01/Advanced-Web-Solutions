<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scan FR-{{ frame.id }}</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background:#f5f7fb; }
    h1 { margin-top: 0; }
    a { color:#2563eb; text-decoration:none; }
    .card { background:white; padding:20px; border-radius:10px; max-width:600px; }
    .label { font-weight:bold; display:inline-block; width:150px; }
    .pill { padding:4px 10px; border-radius:999px; font-size:12px; }
    .pill-positive { background:#fee2e2; color:#dc2626; }
    .pill-normal { background:#dcfce7; color:#16a34a; }
  </style>
</head>
<body>
  <p><a href="{% url 'scan_list' %}">&larr; Back to scans</a></p>
  <div class="card">
    <h1>Scan FR-{{ frame.id }}</h1>
    <p><span class="label">Patient:</span> {{ frame.user.username }}</p>
    <p>
      <span class="label">Status:</span>
      {% if frame.alert_flag %}
        <span class="pill pill-positive">Positive</span>
      {% else %}
        <span class="pill pill-normal">Normal</span>
      {% endif %}
    </p>
    <p><span class="label">Peak pressure:</span> {{ frame.peak_pressure }}</p>
    <p><span class="label">Contact area:</span> {{ frame.contact_area }}</p>
    <p><span class="label">Recorded at:</span> {{ frame.timestamp }}</p>
  </div>
</body>
</html>
